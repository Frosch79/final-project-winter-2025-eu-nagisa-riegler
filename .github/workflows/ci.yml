name: CI
on: push

jobs:
  ci:
    name: Type Checking, Linting, Jest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PGHOST: localhost
      PGDATABASE: final_project_eu_nagisa_riegler_winter_2025
      PGUSERNAME: final_project_eu_nagisa_riegler_winter_2025
      PGPASSWORD: final_project_eu_nagisa_riegler_winter_2025
      CLOUDINARY_API_SECRET: dummy
      CLOUDINARY_CLOUD_NAME: dummy
      CLOUDINARY_API_KEY: dummy

    steps:
      - name: Start preinstalled PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          pg_isready

      - name: Create database user
        run: |
          sudo -u postgres psql --command="CREATE USER $PGUSERNAME PASSWORD '$PGPASSWORD'" --command="\du"

      - name: Create database
        run: |
          sudo -u postgres createdb --owner=$PGUSERNAME $PGDATABASE

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run database migrations
        run: pnpm migrate up

      - name: Start Metro for typedRoutes TS
        run: |
          echo "Starting Expo project..."
          pnpm expo start > expo.log 2>&1 &
          expo_pid=$!
          for i in {1..10}; do
            if grep -q "Logs for your project will appear below." expo.log; then
              echo "Expo server started successfully"
              break
            fi
            echo "Waiting for Expo server to start... ($i/10)"
            sleep 1
          done
          if ! grep -q "Logs for your project will appear below." expo.log; then
            echo "Expo server failed to start in time"
            kill $expo_pid
            exit 1
          fi
          kill $expo_pid

      - name: Check TypeScript types
        run: pnpm tsc

      - name: Lint with ESLint
        run: pnpm eslint . --max-warnings 0

      - name: Run Jest tests
        run: pnpm test:ci

      - name: Tear down database
        run: pnpm migrate down --all
  build-apk:
    runs-on: ubuntu-latest
    outputs:
      apk-path: android/app/build/outputs/apk/release/app-release.apk
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: android

        env:
          EXPO_PUBLIC_API_URL: 'http://10.0.2.2:3000'
          MAESTRO: 'true'
      # ビルドしたAPKを保存
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  # 2. テスト専用ジョブ（ここが本番）
  maestro-test:
    needs: build-apk # ビルドが終わるまで待つ
    runs-on: macos-latest
    env:
      PGHOST: localhost
      PGDATABASE: final_project_eu_nagisa_riegler_winter_2025
      PGUSERNAME: final_project_eu_nagisa_riegler_winter_2025
      PGPASSWORD: final_project_eu_nagisa_riegler_winter_2025
    steps:
      - uses: actions/checkout@v4
      # DBとMaestroだけ準備（ビルドはしないのでメモリが空いている）
      - name: Start PostgreSQL on macOS
        run: |
          brew install postgresql@17
          # パスを通す (重要: これがないと psql や pg_isready が見つかりません)
          echo "/opt/homebrew/opt/postgresql@17/bin" >> $GITHUB_PATH
          export PATH="/opt/homebrew/opt/postgresql@17/bin:$PATH"

          brew services start postgresql@17

          # 起動を待つ
          until pg_isready; do sleep 3; done

          # ユーザーとDBの作成 (macOSのbrew版は標準ユーザーが実行権限を持ちます)
          psql postgres -c "CREATE ROLE $PGUSERNAME WITH LOGIN PASSWORD '$PGPASSWORD' SUPERUSER;"
          createdb -O $PGUSERNAME $PGDATABASE
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm migrate up

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # 保存されたAPKをダウンロード
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: .

      - name: Run Maestro Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          # Use 'aosp_atd' - it is a "headless" image with no Google Play,
          # making it much faster to boot on CI.
          target: aosp_atd
          arch: arm64-v8a
          profile: pixel_6
          disable-animations: true
          # Increase timeout to 15 minutes (900 seconds)
          emulator-boot-timeout: 900
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim
          script: |
            export PATH="$PATH:$HOME/.maestro/bin"
            # Ensure ADB is connected
            adb wait-for-device
            # Install and run
            adb install app-release.apk
            maestro test .maestro/

      - name: Tear down database
        run: pnpm migrate down --all
