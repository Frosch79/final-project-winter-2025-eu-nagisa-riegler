name: CI
on: push

jobs:
  ci:
    name: Type Checking, Linting, Jest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PGHOST: localhost
      PGDATABASE: final_project_eu_nagisa_riegler_winter_2025
      PGUSERNAME: final_project_eu_nagisa_riegler_winter_2025
      PGPASSWORD: final_project_eu_nagisa_riegler_winter_2025
      CLOUDINARY_API_SECRET: dummy
      CLOUDINARY_CLOUD_NAME: dummy
      CLOUDINARY_API_KEY: dummy

    steps:
      - name: Start preinstalled PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          pg_isready

      - name: Create database user
        run: |
          sudo -u postgres psql --command="CREATE USER $PGUSERNAME PASSWORD '$PGPASSWORD'" --command="\du"

      - name: Create database
        run: |
          sudo -u postgres createdb --owner=$PGUSERNAME $PGDATABASE

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run database migrations
        run: pnpm migrate up

      - name: Start Metro for typedRoutes TS
        run: |
          echo "Starting Expo project..."
          pnpm expo start > expo.log 2>&1 &
          expo_pid=$!
          for i in {1..10}; do
            if grep -q "Logs for your project will appear below." expo.log; then
              echo "Expo server started successfully"
              break
            fi
            echo "Waiting for Expo server to start... ($i/10)"
            sleep 1
          done
          if ! grep -q "Logs for your project will appear below." expo.log; then
            echo "Expo server failed to start in time"
            kill $expo_pid
            exit 1
          fi
          kill $expo_pid

      - name: Check TypeScript types
        run: pnpm tsc

      - name: Lint with ESLint
        run: pnpm eslint . --max-warnings 0

      - name: Run Jest tests
        run: pnpm test:ci

      - name: Tear down database
        run: pnpm migrate down --all

  maestro-local:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: final_project_eu_nagisa_riegler_winter_2025
      PGUSERNAME: ${{ secrets.PGPASSWORD }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }} # Set your actual local password here

    steps:
      - uses: actions/checkout@v4

      # 1. Install Dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 2. Database Migration (Local DB)
      - name: Run database migrations
        run: pnpm migrate up

      # 3. Build Release APK (Windows uses .bat)
      - name: Build Release APK
        run: .\gradlew.bat assembleRelease
        working-directory: android
        env:
          EXPO_PUBLIC_API_URL: 'http://10.0.2.2:3000'
          POSTGRES_URL: ''
          MAESTRO: 'true'

      # 4. Install and Run Maestro
      - name: Run Maestro Tests
        shell: cmd # Force Windows Command Prompt
        run: |
          echo "Installing APK to running emulator..."
          adb install -r android\app\build\outputs\apk\release\app-release.apk

          echo "Starting Maestro Tests..."
          maestro test .maestro/

      # 5. Clean up (Optional)
      - name: Tear down database
        run: pnpm migrate down --all
