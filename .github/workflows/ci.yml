name: CI
on: push

jobs:
  ci:
    name: Type Checking, Linting, Jest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PGHOST: localhost
      PGDATABASE: final_project_eu_nagisa_riegler_winter_2025
      PGUSERNAME: final_project_eu_nagisa_riegler_winter_2025
      PGPASSWORD: final_project_eu_nagisa_riegler_winter_2025
      CLOUDINARY_API_SECRET: dummy
      CLOUDINARY_CLOUD_NAME: dummy
      CLOUDINARY_API_KEY: dummy

    steps:
      - name: Start preinstalled PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          pg_isready

      - name: Create database user
        run: |
          sudo -u postgres psql --command="CREATE USER $PGUSERNAME PASSWORD '$PGPASSWORD'" --command="\du"

      - name: Create database
        run: |
          sudo -u postgres createdb --owner=$PGUSERNAME $PGDATABASE

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run database migrations
        run: pnpm migrate up

      - name: Start Metro for typedRoutes TS
        run: |
          echo "Starting Expo project..."
          pnpm expo start > expo.log 2>&1 &
          expo_pid=$!
          for i in {1..10}; do
            if grep -q "Logs for your project will appear below." expo.log; then
              echo "Expo server started successfully"
              break
            fi
            echo "Waiting for Expo server to start... ($i/10)"
            sleep 1
          done
          if ! grep -q "Logs for your project will appear below." expo.log; then
            echo "Expo server failed to start in time"
            kill $expo_pid
            exit 1
          fi
          kill $expo_pid

      - name: Check TypeScript types
        run: pnpm tsc

      - name: Lint with ESLint
        run: pnpm eslint . --max-warnings 0

      - name: Run Jest tests
        run: pnpm test:ci

  maestro:
    name: Maestro E2E Tests
    # macOSはエミュレーターが標準で速いですが、Linuxで粘るなら以下
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # 追加

      # NodeとInstallを追加（DB操作に必要なら）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      # 1. Maestro CLIのインストール
      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # 2. Expo Build (EAS) から APK をダウンロード
      # URLはあなたが提示したものの「直接ダウンロード用URL」に差し替えてください
      - name: Get Latest Build URL and Download
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # eas-cliを事前にインストールしてログを分離する
          pnpm install -g eas-cli

          # 完了済みの最新ビルドURLを取得（エラーハンドリング付き）
          # --non-interactive をつけることで余計な対話ログを防ぎます
          RAW_JSON=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive)

          # JSONからURLを抽出（applicationArchiveUrl または buildUrl）
          LATEST_URL=$(echo "$RAW_JSON" | jq -r '.[0].artifacts.applicationArchiveUrl // .[0].artifacts.buildUrl')

          if [ "$LATEST_URL" = "null" ] || [ -z "$LATEST_URL" ]; then
            echo "Error: Could not find build URL. Raw output was:"
            echo "$RAW_JSON"
            exit 1
          fi

          echo "Latest Build URL: $LATEST_URL"
          curl -L "$LATEST_URL" -o app-debug.apk

      # 3. エミュレーターを起動してテスト
      - name: Run Android Emulator & Maestro E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: arm64-v8a
          disable-animations: true
          script: |
            # ダウンロードしたAPKをインストール
            adb install app-debug.apk
            # Maestroテスト実行
            maestro test .maestro/

      - name: Tear down database
        run: pnpm migrate down --all
