name: CI
on: push

jobs:
  ci:
    name: Type Checking, Linting, Jest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PGHOST: localhost
      PGDATABASE: final_project_eu_nagisa_riegler_winter_2025
      PGUSERNAME: final_project_eu_nagisa_riegler_winter_2025
      PGPASSWORD: final_project_eu_nagisa_riegler_winter_2025
      CLOUDINARY_API_SECRET: dummy
      CLOUDINARY_CLOUD_NAME: dummy
      CLOUDINARY_API_KEY: dummy

    steps:
      - name: Start preinstalled PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          pg_isready

      - name: Create database user
        run: |
          sudo -u postgres psql --command="CREATE USER $PGUSERNAME PASSWORD '$PGPASSWORD'" --command="\du"

      - name: Create database
        run: |
          sudo -u postgres createdb --owner=$PGUSERNAME $PGDATABASE

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run database migrations
        run: pnpm migrate up

      - name: Start Metro for typedRoutes TS
        run: |
          echo "Starting Expo project..."
          pnpm expo start > expo.log 2>&1 &
          expo_pid=$!
          for i in {1..10}; do
            if grep -q "Logs for your project will appear below." expo.log; then
              echo "Expo server started successfully"
              break
            fi
            echo "Waiting for Expo server to start... ($i/10)"
            sleep 1
          done
          if ! grep -q "Logs for your project will appear below." expo.log; then
            echo "Expo server failed to start in time"
            kill $expo_pid
            exit 1
          fi
          kill $expo_pid

      - name: Check TypeScript types
        run: pnpm tsc

      - name: Lint with ESLint
        run: pnpm eslint . --max-warnings 0

      - name: Run Jest tests
        run: pnpm test:ci

      - name: Tear down database
        run: pnpm migrate down --all

  maestro-local:
    runs-on: macos-latest
    env:
      PGHOST: localhost
      PGDATABASE: final_project_eu_nagisa_riegler_winter_2025
      PGUSERNAME: postgres # macOSのbrew版は標準がpostgres
      PGPASSWORD: password

    steps:
      - uses: actions/checkout@v4

      # 1. PostgreSQLのセットアップ (macOS用)
      - name: Start PostgreSQL on macOS
        run: |
          # 1. インストール
          brew install postgresql@17

          # 2. パスを通す（重要：これで pg_isready や psql が使えるようになります）
          echo "/opt/homebrew/opt/postgresql@17/bin" >> $GITHUB_PATH
          export PATH="/opt/homebrew/opt/postgresql@17/bin:$PATH"

          # 3. 起動
          brew services start postgresql@17

          # 4. 起動完了まで待機
          # 初回は時間がかかる場合があるため、最大15回リトライします
          for i in {1..15}; do
            if pg_isready; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/15)"
            sleep 3
          done

          # 5. ユーザーとデータベースの作成
          psql postgres -c "CREATE ROLE $PGUSERNAME WITH LOGIN PASSWORD '$PGPASSWORD' SUPERUSER;"
          createdb -O $PGUSERNAME $PGDATABASE

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm migrate up

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 2. ビルド (EXPO_PUBLIC_API_URL をエミュレータから見たPCのIP 10.0.2.2 にする)
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: android
        env:
          EXPO_PUBLIC_API_URL: 'http://10.0.2.2:3000'
          POSTGRES_URL: ''
          MAESTRO: 'true'

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # 3. エミュレータ実行 (Apple Siliconに最適化)
      - name: Run Maestro Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: arm64-v8a # macOSランナーはこの組み合わせが最速
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim
          script: |
            adb wait-for-device
            adb install android/app/build/outputs/apk/release/app-release.apk
            maestro test .maestro/

      - name: Tear down database
        run: pnpm migrate down --all
