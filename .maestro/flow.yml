appId: com.final_project_winter_2025_eu_nagisa_riegler
---
# reload app
- stopApp
- launchApp:
    clearState: true

  # --- Login page to register page ---
- assertVisible: PixVault

- tapOn:
    id: register-button

# --- Input register user data ---
- tapOn:
    id: input-username
- inputText:
    text: TestUser
- hideKeyboard

- tapOn:
    id: input-birthday
- inputText:
    text: 1990-01-01
- hideKeyboard

- tapOn:
    id: input-country
- inputText:
    text: Norway
- hideKeyboard

- tapOn:
    id: input-description
- inputText:
    text: This is a test user.
- hideKeyboard

- tapOn:
    id: input-email
- inputText:
    text: testuser@example.com
- hideKeyboard

- tapOn:
    id: input-password
- inputText:
    text: Password123
- hideKeyboard

- tapOn:
    id: input-confirm-password
- inputText:
    text: Password123
- hideKeyboard

- tapOn:
    id: register
- assertVisible:
    id: 'avatar'

# --- Logout ---
- tapOn: 'logout'

# --- Login ---
- tapOn:
    id: 'input-email'
- inputText:
    text: 'testuser@example.com'
- 'hideKeyboard'

- tapOn:
    id: 'input-password'
- inputText:
    text: 'Password123'
- 'hideKeyboard'

- tapOn:
    id: 'login-button'

# --- Login success ---
- assertVisible:
    id: 'user-page'

# --- Check user page---
- tapOn:
    id: 'follower-text'
- assertVisible: 'Follower'
- tapOn:
    id: 'close-button'
- tapOn:
    id: 'followed'
- assertVisible: 'Followed'
- tapOn:
    id: 'close-button'
- tapOn:
    id: 'edit'
- assertVisible: 'Edit Account'
- tapOn:
    id: 'edit-name'
- 'eraseText'
- inputText:
    text: 'Edit User'
- 'hideKeyboard'
- tapOn:
    id: 'edit-country'
- 'eraseText'
- inputText:
    text: 'Japan'
- 'hideKeyboard'
- tapOn:
    id: 'edit-description'
- 'eraseText'
- inputText:
    text: 'This is edit user.'
- 'hideKeyboard'
- tapOn: 'EDIT'

- assertVisible: 'Edit User'
- assertVisible: 'This is edit user.'
- assertVisible: 'Country: Japan'
- tapOn:
    id: 'write-album'
- assertVisible: 'Create Album'
- tapOn:
    id: 'input-album-title'
- inputText:
    text: 'Album title'
- hideKeyboard
- tapOn:
    id: 'input-description'
- inputText:
    text: 'Album description'
- hideKeyboard
- tapOn:
    id: 'input-location'
- inputText:
    text: 'Album location'
- hideKeyboard
- tapOn: 'Ok'
- assertVisible: 'Album title'
- assertVisible: 'Album description'

- tapOn:
    id: 'album-edit'

- assertVisible: 'Edit Album'
- tapOn:
    id: 'edit-album-title'
- 'eraseText'
- inputText:
    text: 'Edit title'
- hideKeyboard
- tapOn:
    id: 'edit-album-description'
- 'eraseText'
- inputText:
    text: 'Edit description'
- hideKeyboard
- tapOn:
    id: 'edit-album-location'
- 'eraseText'
- inputText:
    text: 'Edit location'
- hideKeyboard

- tapOn: 'EDIT'

- assertVisible: 'Edit title'
- assertVisible: 'Edit description'
- assertVisible: 'Edit location'

# --- Upload images ---

- tapOn:
    id: 'photo-create'
- tapOn:
    id: 'select-photo'
- addMedia:
    - assets/test_image1.jpg

- tapOn: 'test_image1.jpg'
- assertVisible:
    id: 'upload-photo'

- tapOn: Photo title
- inputText:
    text: Photo title
- hideKeyboard

- tapOn: Description
- inputText:
    text: Photo description
- hideKeyboard

- tapOn: Location
- inputText:
    text: Photo location
- hideKeyboard

- tapOn:
    id: continue-button

- assertVisible:
    id: 'photo'
    index: 0
- tapOn:
    id: 'photo'
    index: 0
- assertVisible:
    id: photo-image
- tapOn:
    id: back-button
- assertVisible: Album
- tapOn:
    id: 'exit-album'
