appId: com.final_project_winter_2025_eu_nagisa_riegler
---
# reload app
- stopApp
- launchApp:
    clearState: true

  # --- Login page to register page ---
- assertVisible: PixVault
- tapOn:
    id: register-button
- tapOn:
    id: input-username
- inputText:
    text: TestUser
- tapOn:
    id: input-birthday
- inputText:
    text: 1990-01-01
- tapOn:
    id: input-country
- inputText:
    text: Norway
- tapOn:
    id: input-description
- inputText:
    text: This is a test user.
- tapOn:
    id: input-email
- inputText:
    text: testuser@example.com
- scrollUntilVisible:
    element:
      id: input-password
- tapOn:
    id: input-password
- inputText:
    text: Password123

- scrollUntilVisible:
    element:
      id: input-confirm-password
- tapOn:
    id: input-confirm-password
- inputText:
    text: Password123

- tapOn:
    id: register
- runFlow:
    when:
      visible:
        id: 'user-page'
    file: login.yml
